name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Prevent duplicate runs
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:

    runs-on: ubuntu-latest

    steps:

      # -------------------------------
      # 1. Checkout code
      # -------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------
      # 2. Set up Python (with caching)
      # -------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # -------------------------------
      # 3. Install dependencies
      # -------------------------------
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      # -------------------------------
      # 4. Code formatting check 
      # -------------------------------
      - name: Lint Code (flake8)
        run: |
          pip install flake8
          flake8 app --count --max-line-length=100 --statistics

      # -------------------------------
      # 5. Security scan 
      # -------------------------------
      - name: Dependency Security Scan
        run: |
          pip install pip-audit
          pip-audit || true

      # -------------------------------
      # 6. Unit test stage (future-proofing)
      # -------------------------------
      - name: Run Tests (pytest)
        run: |
          pip install pytest
          if [ -d "tests" ]; then pytest -q; else echo "No tests found - skipping"; fi

      # -------------------------------
      # 7. Docker build (production tagging)
      # -------------------------------
      - name: Build Docker Image
        run: |
          docker build \
            -t devops-phase0:latest \
            -t devops-phase0:${{ github.sha }} \
            ./app

      # -------------------------------
      # 8. Validate Docker image
      # -------------------------------
      - name: Verify Docker Image
        run: |
          docker images | grep devops-phase0

      # -------------------------------
      # 9. Basic container sanity test 
      # -------------------------------
      - name: Test Docker Container
        run: |
          docker run -d -p 5000:5000 --name test-app devops-phase0:latest
          sleep 5
          curl -f http://localhost:5000/health || (docker logs test-app && exit 1)
          docker stop test-app
          docker rm test-app
